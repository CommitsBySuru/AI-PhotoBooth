<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Booth Strip</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: flex-start;
      margin-top: 20px;
    }

    .camera-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    video {
      border: 3px solid #333;
      border-radius: 10px;
      width: 250px; /* small camera */
      height: auto;
    }

    .controls {
      margin-top: 10px;
      text-align: center;
    }

    button, select {
      margin: 5px;
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
    }

    .strip-template {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .polaroid {
      width: 120px;
      height: 160px;
      background: #fff;
      border: 2px solid #ccc;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #aaa;
    }

    img.photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <h1>Photo Booth Strip</h1>

  <div class="container">
    <div id="strip" class="strip-template">
      <!-- Polaroid placeholders appear here -->
    </div>
    <div class="camera-section">
      <video id="video" autoplay></video>

      <div class="controls">
        <label>Number of Photos:
          <select id="numPhotos">
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>

        <br>

        <label>Filter:
          <select id="filter">
            <option value="none">None</option>
            <option value="grayscale(100%)">Grayscale</option>
            <option value="sepia(100%)">Sepia</option>
            <option value="invert(100%)">Invert</option>
            <option value="contrast(200%)">High Contrast</option>
          </select>
        </label>

        <br>

        <button id="snap">Take Photo</button>
        <button id="retry">Retry</button>
        <button id="download">Download Strip</button>
      </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
